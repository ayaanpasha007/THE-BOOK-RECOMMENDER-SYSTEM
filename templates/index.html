
<!DOCTYPE html>
<html>
<head>
<title>Book Recommender</title>
</head>
<body>
<h2>Select a Book</h2>

<form action="/recommend" method="post">
<select name="book">
{% for book in books %}
<option value="{{book}}">{{book}}</option>
{% endfor %}
</select>
<button type="submit">Recommend</button>
</form>

</body>
</html>
